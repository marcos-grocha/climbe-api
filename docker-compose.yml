services:
  postgres:
    image: postgres:16-alpine
    container_name: climbe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: climbe
      POSTGRES_PASSWORD: climbe
      POSTGRES_DB: climbe
    ports:
      - "5432:5432"
    volumes:
      - climbe-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U climbe -d climbe"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  climbe-pg-data:

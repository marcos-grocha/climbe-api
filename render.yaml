# Deploy do climbe-api no Render (plano free), banco incluso.
# ATENÇÃO: o Postgres free do Render expira/é removido em ~30 dias.
# Aceitável aqui porque o uso é pontual; para algo duradouro, migre para
# um Postgres gerenciado (Neon, Supabase, etc.).
services:
  - type: web
    name: climbe-api
    runtime: python
    plan: free
    region: oregon
    branch: main
    healthCheckPath: /health
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Conecta automaticamente ao Postgres free definido em `databases` abaixo.
      - key: DATABASE_URL
        fromDatabase:
          name: climbe-db
          property: connectionString

      # Gere com: python -c "import secrets; print(secrets.token_urlsafe(64))"
      - key: JWT_SECRET
        sync: false

      - key: ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "60"

      # Admin inicial criado pela migration de seed. Troque a senha!
      - key: ADMIN_EMAIL
        value: admin@climbe.local
      - key: ADMIN_PASSWORD
        sync: false

      # Origens do front (CSV). Ajuste para a URL real do frontend.
      - key: ALLOWED_ORIGINS
        value: http://localhost:5173

      # Google OAuth — preencha se for usar login com Google.
      # O redirect precisa apontar para a URL pública do Render.
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false

databases:
  - name: climbe-db
    plan: free
    region: oregon
    databaseName: climbe
    user: climbe
